<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Youin promo</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #fbfbfa;
        --paper-2: #f2f2f1;
        --ink: #27252d;
        --muted: #706f78;
        --mark: #7158e8;
        --mark-soft: #ebe7ff;
        --rule: #deddd9;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 440px;
        height: 280px;
        overflow: hidden;
        background: var(--paper);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }
      body {
        position: relative;
      }
      .page {
        position: absolute;
        inset: 22px 24px 24px 28px;
        border: 1px solid var(--rule);
        background: white;
        box-shadow: 0 22px 48px -34px rgb(39 37 45 / 0.34);
      }
      .bar {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 34px;
        border-bottom: 1px solid var(--rule);
        padding: 0 12px;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 99px;
        background: var(--rule);
      }
      .layout {
        display: grid;
        grid-template-columns: 1fr 116px;
        gap: 16px;
        padding: 18px;
      }
      .line {
        height: 8px;
        border-radius: 99px;
        background: var(--paper-2);
        margin-bottom: 10px;
      }
      .line.long {
        width: 82%;
      }
      .line.mid {
        width: 58%;
      }
      .card {
        height: 82px;
        border: 1px solid var(--rule);
        background: var(--paper);
      }
      .panel {
        padding: 12px;
        border-left: 1px solid var(--rule);
      }
      .pin {
        position: absolute;
        left: 154px;
        top: 116px;
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 50%;
        background: var(--mark);
        color: white;
        font-weight: 700;
        box-shadow: 0 10px 26px -12px rgb(113 88 232 / 0.7);
      }
      .thread {
        position: absolute;
        right: 36px;
        bottom: 30px;
        width: 170px;
        border: 1px solid color-mix(in srgb, var(--mark) 28%, var(--rule));
        background: white;
        padding: 12px;
        box-shadow: 0 18px 40px -28px rgb(39 37 45 / 0.5);
      }
      .thread .line {
        height: 7px;
        margin-bottom: 8px;
      }
      .brand {
        position: absolute;
        left: 40px;
        bottom: 36px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--ink);
        font-size: 20px;
        font-weight: 700;
      }
      .mark {
        display: grid;
        width: 28px;
        height: 28px;
        place-items: center;
        border-radius: 9px;
        background: var(--mark);
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="bar">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <div class="layout">
        <div>
          <div class="line long"></div>
          <div class="line mid"></div>
          <div class="card"></div>
        </div>
        <div class="panel">
          <div class="line"></div>
          <div class="line"></div>
          <div class="line mid"></div>
        </div>
      </div>
    </div>
    <div class="pin">1</div>
    <div class="thread">
      <div class="line long"></div>
      <div class="line"></div>
      <div class="line mid"></div>
    </div>
    <div class="brand">
      <span class="mark">Y</span>
      <span>Youin</span>
    </div>
  </body>
</html>
