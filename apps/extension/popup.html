<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youin</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      width: 240px;
      padding: 14px 16px;
      font: 500 12px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: oklch(17% 0.01 50);
      background: oklch(97.5% 0.007 65);
    }
    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    p { color: oklch(40% 0.009 50); }
    kbd {
      display: inline-block;
      font: 600 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      padding: 2px 5px;
      margin: 0 1px;
      border-radius: 3px;
      background: oklch(91% 0.011 65);
      border: 1px solid oklch(86% 0.009 65);
      color: oklch(17% 0.01 50);
    }
  </style>
</head>
<body>
  <h1>Youin</h1>
  <p>On any page: <kbd>⌥</kbd><kbd>⇧</kbd><kbd>Y</kbd> to capture.</p>
</body>
</html>
